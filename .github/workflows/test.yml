name: Run Tests

on:
  push:
    branches:
      - master
    paths:
      - 'dotnet/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'dotnet/**'
      - '.github/workflows/test.yml'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  TEST_PROJECT_PATH: dotnet/tests/Baileys.Tests/Baileys.Tests.csproj

jobs:
  run-tests:
    name: Baileys.NET Tests (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore dotnet/Baileys.slnx

      - name: Build (Release)
        run: dotnet build dotnet/Baileys.slnx --configuration Release --no-restore

      - name: Run xUnit tests
        run: >
          dotnet test ${{ env.TEST_PROJECT_PATH }}
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
