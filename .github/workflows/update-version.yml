name: Update Baileys.NET Package Version

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'New semantic version (e.g. 1.3.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    name: Bump Baileys.NET version to ${{ github.event.inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate semver input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$VERSION'. Must be a semver string like 1.3.0"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update <Version> in Baileys.csproj
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" \
            dotnet/src/Baileys/Baileys.csproj
          echo "Updated to version $VERSION"
          grep '<Version>' dotnet/src/Baileys/Baileys.csproj

      - name: Build & test against the new version
        run: |
          dotnet restore dotnet/Baileys.slnx
          dotnet build dotnet/Baileys.slnx --configuration Release --no-restore
          dotnet test dotnet/tests/Baileys.Tests/Baileys.Tests.csproj \
            --configuration Release --no-build --verbosity minimal

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="update-version/dotnet-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing branch with the same name
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME"
          git add dotnet/src/Baileys/Baileys.csproj
          git commit -m "chore: bump Baileys.NET version to ${VERSION}"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "chore: bump Baileys.NET version to ${VERSION}" \
            --body-file - \
            --base master \
            --head "$BRANCH_NAME" << PREOF || echo "PR already exists or could not be created"
          Automated version bump for the \`Baileys.NET\` NuGet package.

          **New version:** \`${VERSION}\`

          **File updated:**
          - \`dotnet/src/Baileys/Baileys.csproj\`

          After merging, push the tag \`v${VERSION}-dotnet\` to trigger the NuGet publish workflow.
          PREOF
